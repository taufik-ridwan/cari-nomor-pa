<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cari Nomor PA</title>
    <!-- Tailwind CSS for Professional Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for Excel Processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <div class="max-w-5xl mx-auto pt-10 pb-8 px-4">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-700 mb-2">Cari Nomor PA (semoga ketemu, aamiin x999)</h1>
            <p class="text-slate-500">Semoga bermanfaat :)</p>
        </div>

        <!-- Main Input Card -->
        <div class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden mb-8">
            
            <!-- Step 1: File Upload -->
            <div class="p-5 border-b border-slate-100 bg-slate-50/50">
                <label class="block text-sm font-semibold text-slate-700 mb-3">1. Upload File Excel (Bisa pilih lebih dari satu)</label>
                <div class="flex flex-col sm:flex-row sm:items-center space-y-3 sm:space-y-0 sm:space-x-4">
                    <input type="file" id="excelFile" accept=".xls,.xlsx" multiple
                        class="block w-full text-sm text-slate-500
                        file:mr-4 file:py-2 file:px-4
                        file:rounded-md file:border-0
                        file:text-sm file:font-semibold
                        file:bg-blue-100 file:text-blue-700
                        hover:file:bg-blue-200 cursor-pointer transition-all focus:outline-none"
                    />
                </div>
                <div id="fileStatus" class="mt-3 px-4 py-2.5 rounded-md text-sm font-medium hidden">
                    <span id="fileStatusText"></span>
                </div>
            </div>

            <!-- Step 2: Search Input (Now supports multi-line / multiple RM) -->
            <div class="p-5">
                <label for="searchRM" class="block text-sm font-semibold text-slate-700 mb-3">2. Cari Nomor Rekam Medis (Kolom C)</label>
                <div class="flex flex-col space-y-3">
                    <textarea id="searchRM" rows="3" placeholder="Masukkan satu atau banyak Nomor RM...&#10;(Pisahkan dengan baris baru, spasi, atau copy-paste langsung dari Excel)" 
                        class="w-full rounded-md border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all shadow-sm resize-y"
                        onkeypress="handleKeyPress(event)"
                    ></textarea>
                    
                    <div class="flex justify-between items-center">
                        <div id="errorMsg" class="text-sm text-red-500 font-medium hidden"></div>
                        <button onclick="searchData()" 
                            class="ml-auto bg-blue-600 hover:bg-blue-700 text-white px-8 py-2.5 rounded-md font-medium transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 whitespace-nowrap">
                            Cari Semua Data
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Step 3: Result Container (For multiple cards) -->
        <div id="resultContainer" class="hidden">
            <div class="flex items-center justify-between mb-4 px-1 border-b border-slate-200 pb-2">
                <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider">Hasil Pencarian</h3>
                <span id="resultSummary" class="text-sm font-bold text-slate-600"></span>
            </div>
            
            <!-- Dynamic Patient Cards will be injected here -->
            <div id="resultsList" class="space-y-6"></div>
        </div>

        <div class="text-center mt-12 text-xs text-slate-400">
            Bisa crash dan eror sewaktu-waktu. Whoops kwkwkwk
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        let excelData =[];

        // --- KONFIGURASI KOLOM (A=0, B=1, C=2, D=3, E=4, dst) ---
        const COL_NO_PA = 1;       // Kolom B
        const COL_NO_RM = 2;       // Kolom C
        const COL_NAMA_PASIEN = 4; // Kolom E (Telah diperbarui!)
        const COL_WAKTU = 6;       // Kolom G
        const COL_RESIDEN = 28;    // Kolom AC
        const COL_KONSULEN = 29;   // Kolom AD

        // Listen for multiple file uploads
        document.getElementById('excelFile').addEventListener('change', async function(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            const statusBox = document.getElementById('fileStatus');
            const statusText = document.getElementById('fileStatusText');
            
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('resultsList').innerHTML = '';
            
            statusBox.className = "mt-3 px-4 py-2.5 rounded-md text-sm font-medium bg-blue-50 text-blue-700";
            statusText.innerText = "⏳ Memproses " + files.length + " file, harap tunggu...";
            statusBox.classList.remove('hidden');
            
            excelData =[]; 

            try {
                const readPromises = Array.from(files).map(file => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            try {
                                const data = new Uint8Array(event.target.result);
                                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                                const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                                resolve(json);
                            } catch (err) {
                                reject(err);
                            }
                        };
                        reader.onerror = reject;
                        reader.readAsArrayBuffer(file);
                    });
                });

                const allFilesData = await Promise.all(readPromises);
                
                for (let data of allFilesData) {
                    excelData = excelData.concat(data);
                }

                statusBox.className = "mt-3 px-4 py-2.5 rounded-md text-sm font-medium bg-emerald-50 text-emerald-700";
                statusText.innerText = `✓ Berhasil memuat ${files.length} file (Total ${excelData.length} baris data).`;

            } catch (err) {
                statusBox.className = "mt-3 px-4 py-2.5 rounded-md text-sm font-medium bg-red-50 text-red-700";
                statusText.innerText = "✖ Gagal membaca salah satu file. Pastikan formatnya benar.";
                console.error(err);
            }
        });

        // Allow searching by pressing 'Ctrl + Enter' or 'Cmd + Enter' in textarea
        function handleKeyPress(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                searchData();
            }
        }

        // Format Date exactly like "19-02-2026 11:30:03"
        function formatDateCompact(dateObj) {
            const pad = (n) => n.toString().padStart(2, '0');
            return `${pad(dateObj.getDate())}-${pad(dateObj.getMonth() + 1)}-${dateObj.getFullYear()} ${pad(dateObj.getHours())}:${pad(dateObj.getMinutes())}:${pad(dateObj.getSeconds())}`;
        }

        function searchData() {
            const searchInput = document.getElementById('searchRM').value.trim();
            const resultContainer = document.getElementById('resultContainer');
            const resultsList = document.getElementById('resultsList');
            const resultSummary = document.getElementById('resultSummary');
            
            if (excelData.length === 0) {
                showError("Silakan upload file Excel terlebih dahulu.");
                return;
            }
            if (!searchInput) {
                showError("Masukkan minimal satu Nomor Rekam Medis.");
                return;
            }

            hideError();
            resultsList.innerHTML = '';

            // Split input by newlines, spaces, or commas, and remove empty entries
            const searchTermsArray = searchInput.split(/[\s,]+/).filter(term => term.trim() !== '');
            const searchTermsSet = new Set(searchTermsArray.map(term => term.toLowerCase()));

            let groupedResults = {};

            // Loop through merged array
            for (let i = 0; i < excelData.length; i++) {
                const row = excelData[i];
                let cellC = row[COL_NO_RM]; 
                
                if (cellC != null) {
                    let rmString = String(cellC).trim();
                    let rmLower = rmString.toLowerCase();

                    // If this row matches one of our searched RM numbers
                    if (searchTermsSet.has(rmLower)) {
                        
                        const namaPasien = row[COL_NAMA_PASIEN] != null ? String(row[COL_NAMA_PASIEN]).trim() : "TIDAK DIKETAHUI";
                        const nomorPA = row[COL_NO_PA] != null ? String(row[COL_NO_PA]).trim() : "-";
                        const timestampCell = row[COL_WAKTU];
                        const residen = row[COL_RESIDEN] != null ? String(row[COL_RESIDEN]).trim() : "-";
                        const konsulen = row[COL_KONSULEN] != null ? String(row[COL_KONSULEN]).trim() : "-";

                        let rawDateForSort = 0;
                        let displayDate = "-";

                        // Date Parsing Logic
                        if (timestampCell != null && timestampCell !== "") {
                            if (timestampCell instanceof Date) {
                                rawDateForSort = timestampCell.getTime();
                                displayDate = formatDateCompact(timestampCell);
                            } else if (typeof timestampCell === 'number') {
                                let d = new Date(Math.round((timestampCell - 25569) * 86400 * 1000));
                                rawDateForSort = d.getTime();
                                displayDate = formatDateCompact(d);
                            } else {
                                displayDate = String(timestampCell).trim(); 
                                let match = displayDate.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})(?:\s+(\d{1,2})[:.](\d{1,2})(?:[:.](\d{1,2}))?)?/);
                                if (match) {
                                    let d = parseInt(match[1], 10);
                                    let m = parseInt(match[2], 10) - 1; 
                                    let y = parseInt(match[3], 10);
                                    let hr = match[4] ? parseInt(match[4], 10) : 0;
                                    let min = match[5] ? parseInt(match[5], 10) : 0;
                                    let sec = match[6] ? parseInt(match[6], 10) : 0;
                                    rawDateForSort = new Date(y, m, d, hr, min, sec).getTime();
                                } else {
                                    let parsed = Date.parse(displayDate);
                                    if (!isNaN(parsed)) rawDateForSort = parsed;
                                }
                            }
                        }

                        // Initialize patient group if it doesn't exist
                        if (!groupedResults[rmLower]) {
                            groupedResults[rmLower] = {
                                originalRM: rmString, 
                                nama: namaPasien,
                                records:[]
                            };
                        }

                        // Add record to patient group
                        groupedResults[rmLower].records.push({
                            nomorPA: nomorPA,
                            residen: residen,
                            konsulen: konsulen,
                            rawDate: rawDateForSort,
                            displayDate: displayDate
                        });
                    }
                }
            }

            const patientsFound = Object.keys(groupedResults).length;

            if (patientsFound === 0) {
                resultContainer.classList.add('hidden');
                showError("Tidak ada data yang ditemukan untuk seluruh Nomor RM tersebut.");
                return;
            }

            let totalRecordsFound = 0;
            resultContainer.classList.remove('hidden');

            Object.values(groupedResults).forEach(patient => {
                // SORTING: Oldest first inside the specific patient's array
                patient.records.sort((a, b) => a.rawDate - b.rawDate);
                totalRecordsFound += patient.records.length;

                // Build Patient Card
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden";
                
                // Patient Header
                let htmlContent = `
                    <div class="bg-blue-50/60 px-6 py-4 border-b border-blue-100 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
                        <div>
                            <div class="text-xs text-blue-500 font-bold uppercase tracking-wider mb-0.5">NAMA PASIEN (KOLOM E)</div>
                            <h2 class="text-xl font-bold text-slate-800">${patient.nama}</h2>
                        </div>
                        <div class="sm:text-right bg-white px-4 py-2 rounded-lg border border-blue-100 shadow-sm">
                            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">NOMOR RM</div>
                            <div class="text-lg font-bold text-blue-700 leading-none">${patient.originalRM}</div>
                        </div>
                    </div>
                `;

                // Patient Records Table
                htmlContent += `
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[700px]">
                            <thead>
                                <tr class="bg-slate-50/50 border-b border-slate-200 text-xs uppercase text-slate-500 tracking-wide">
                                    <th class="px-5 py-3 font-semibold w-12 text-center">#</th>
                                    <th class="px-5 py-3 font-semibold w-48">Waktu (Kolom G)</th>
                                    <th class="px-5 py-3 font-semibold w-40">No. PA (Kolom B)</th>
                                    <th class="px-5 py-3 font-semibold">Residen (Kolom AC)</th>
                                    <th class="px-5 py-3 font-semibold">Konsulen (Kolom AD)</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                `;

                // Add rows
                patient.records.forEach((match, index) => {
                    htmlContent += `
                        <tr class="hover:bg-slate-50/80 transition-colors group">
                            <td class="px-5 py-4 text-sm font-bold text-slate-300 text-center group-hover:text-blue-500">${index + 1}</td>
                            <td class="px-5 py-4 text-sm text-slate-600 whitespace-nowrap">
                                <div class="flex items-center">
                                    <svg class="w-4 h-4 mr-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    ${match.displayDate}
                                </div>
                            </td>
                            <td class="px-5 py-4 text-sm font-bold text-slate-800 whitespace-nowrap">${match.nomorPA}</td>
                            <td class="px-5 py-4 text-sm font-medium text-slate-700">${match.residen}</td>
                            <td class="px-5 py-4 text-sm text-slate-600">${match.konsulen}</td>
                        </tr>
                    `;
                });

                htmlContent += `
                            </tbody>
                        </table>
                    </div>
                `;
                
                card.innerHTML = htmlContent;
                resultsList.appendChild(card);
            });

            // Update Header Summary Status
            resultSummary.innerHTML = `<span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full border border-emerald-200">${patientsFound} Pasien Ditemukan</span> &nbsp;<span class="text-slate-400 font-medium">(${totalRecordsFound} total riwayat)</span>`;
            
            // Generate warning card if any searched RM was not found
            if (patientsFound < searchTermsSet.size) {
                const foundRMs = Object.keys(groupedResults);
                const unfoundRMs = Array.from(searchTermsSet).filter(rm => !foundRMs.includes(rm));
                
                if(unfoundRMs.length > 0) {
                    const warningCard = document.createElement('div');
                    warningCard.className = "bg-orange-50 text-orange-700 border border-orange-200 p-4 rounded-xl shadow-sm text-sm font-medium flex items-start mt-4";
                    warningCard.innerHTML = `
                        <svg class="w-5 h-5 mr-3 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <div>
                            <div class="font-bold mb-1">Beberapa Nomor RM tidak ditemukan di file Excel:</div>
                            <div class="font-mono text-xs opacity-90 break-words">${unfoundRMs.join(', ')}</div>
                        </div>
                    `;
                    resultsList.appendChild(warningCard);
                }
            }
        }

        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.innerText = msg;
            errorEl.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.add('hidden');
        }
    </script>
</body>
</html>
